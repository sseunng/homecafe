version: '3.8'

services:
  kiosk:
    build: .
    container_name: homecafe-kiosk
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./server/data:/app/server/data
      - ./server/public/uploads:/app/server/public/uploads
    environment:
      - PORT=3000
      - NODE_ENV=production
